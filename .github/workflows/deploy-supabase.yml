name: Deploy Supabase edge functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detect changed functions
        id: changed
        run: |
          # On a push, compare against the previous commit. On manual runs, deploy
          # everything under supabase/functions/<slug>/.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            funcs=$(ls supabase/functions | grep -v '^_' || true)
          else
            funcs=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^supabase/functions/' \
              | awk -F/ '{print $3}' \
              | grep -v '^_' \
              | sort -u || true)
          fi
          echo "Will deploy:" $funcs
          echo "funcs<<EOF" >> $GITHUB_OUTPUT
          echo "$funcs" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Deploy each changed function
        if: steps.changed.outputs.funcs != ''
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "::group::Deploying $f"
            supabase functions deploy "$f" --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
            echo "::endgroup::"
          done <<< "${{ steps.changed.outputs.funcs }}"
